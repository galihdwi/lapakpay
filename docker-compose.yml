services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      - PHP_IDE_CONFIG="serverName=lapakpay"
      - RUN_PHP_FPM=true
      - YII_ENV=dev
      - YII_DEBUG=true
      - MONGODB_DSN=mongodb://mongodb:27017/lapakpay
      - MONGODB_DATABASE=lapakpay
    depends_on:
      - mongodb

  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
  vendor_data:
